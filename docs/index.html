<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sigma Stack Audit — Security Audit Registry</title>
<meta name="description" content="Full-spectrum security audits combining Vajra, Semgrep, Zentinel, and VulnGraph MCP. CVE intelligence, exploit PoCs, ATT&CK kill chains.">
<meta property="og:title" content="Sigma Stack Audit">
<meta property="og:description" content="Full-spectrum security audit registry. CVE intelligence, exploit PoCs, ATT&CK kill chain mapping.">
<meta name="theme-color" content="#0a0e17">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='none' stroke='%233b82f6' stroke-width='6'/><circle cx='50' cy='30' r='8' fill='%23ef4444'/><circle cx='28' cy='62' r='6' fill='%233b82f6'/><circle cx='72' cy='62' r='6' fill='%2322c55e'/><line x1='50' y1='38' x2='32' y2='58' stroke='%232a3650' stroke-width='2.5'/><line x1='50' y1='38' x2='68' y2='58' stroke='%232a3650' stroke-width='2.5'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e17;--bg2:#111827;--surface:#1a2235;--border:#2a3650;--text:#e2e8f0;--text2:#94a3b8;
--accent:#3b82f6;--red:#ef4444;--orange:#f97316;--yellow:#eab308;--green:#22c55e;--purple:#a855f7;--cyan:#06b6d4}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

.hero{text-align:center;padding:80px 24px 48px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:800px;height:800px;
background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);pointer-events:none}
.hero h1{font-size:2.8rem;font-weight:800;letter-spacing:-0.03em;
background:linear-gradient(135deg,var(--text) 0%,var(--accent) 50%,var(--cyan) 100%);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero .tagline{color:var(--text2);font-size:1rem;margin-bottom:24px;max-width:600px;margin-left:auto;margin-right:auto}
.tools-bar{display:flex;justify-content:center;gap:10px;margin:20px 0;flex-wrap:wrap}
.tool-pill{padding:5px 14px;border-radius:20px;font-size:0.72rem;font-weight:700;letter-spacing:0.03em;
border:1px solid var(--border);background:var(--surface);opacity:0;transform:translateY(8px);
transition:all 0.4s ease}
.tool-pill.show{opacity:1;transform:translateY(0)}
.tool-pill[data-t="vajra"]{border-color:rgba(34,197,94,0.3);color:var(--green)}
.tool-pill[data-t="semgrep"]{border-color:rgba(249,115,22,0.3);color:var(--orange)}
.tool-pill[data-t="zentinel"]{border-color:rgba(6,182,212,0.3);color:var(--cyan)}
.tool-pill[data-t="vulngraph"]{border-color:rgba(59,130,246,0.3);color:var(--accent)}
.tool-pill[data-t="github"]{border-color:rgba(148,163,184,0.3);color:var(--text2)}

.container{max-width:1100px;margin:0 auto;padding:0 24px 64px}

/* ── Aggregate Stats ──────────────── */
.agg-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:40px}
.agg-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;
opacity:0;transform:translateY(16px);transition:all 0.5s ease}
.agg-card.show{opacity:1;transform:translateY(0)}
.agg-card .n{font-size:1.8rem;font-weight:800;font-family:'JetBrains Mono',monospace}
.agg-card .l{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px}
.agg-card.danger .n{color:var(--red)}

/* ── Report Cards ─────────────────── */
.reports-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.reports-header h2{font-size:1.3rem;font-weight:700}
.reports-header .count{color:var(--text2);font-size:0.85rem}
.report-grid{display:flex;flex-direction:column;gap:12px}

.report-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
padding:24px;transition:all 0.3s ease;opacity:0;transform:translateY(20px);cursor:pointer;
text-decoration:none;color:var(--text);display:block}
.report-card.show{opacity:1;transform:translateY(0)}
.report-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(59,130,246,0.1);text-decoration:none}

.rc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
.rc-repo{font-size:1.15rem;font-weight:700}
.rc-date{color:var(--text2);font-size:0.75rem}
.rc-risk{padding:4px 12px;border-radius:6px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.rc-risk.CRITICAL{background:rgba(239,68,68,0.15);color:var(--red)}
.rc-risk.HIGH{background:rgba(249,115,22,0.15);color:var(--orange)}
.rc-risk.MEDIUM{background:rgba(234,179,8,0.15);color:var(--yellow)}
.rc-risk.LOW{background:rgba(34,197,94,0.15);color:var(--green)}

.rc-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px}
.rc-stat{background:rgba(255,255,255,0.02);border-radius:8px;padding:10px;text-align:center}
.rc-stat .v{font-size:1.1rem;font-weight:700;font-family:'JetBrains Mono',monospace}
.rc-stat .k{font-size:0.6rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em}
.rc-stat.crit .v{color:var(--red)}
.rc-stat.expl .v{color:var(--orange)}

.rc-top-cve{display:flex;align-items:center;gap:10px;padding:10px 14px;
background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.1);border-radius:8px;font-size:0.82rem}
.rc-top-cve .cve-id{font-weight:700;color:var(--red)}
.rc-top-cve .cve-meta{color:var(--text2);font-size:0.75rem;margin-left:auto}

.rc-footer{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:0.78rem;color:var(--accent);font-weight:600}
.rc-footer svg{width:14px;height:14px}

/* ── Empty State ──────────────────── */
.empty{text-align:center;padding:80px 24px;color:var(--text2)}
.empty h3{font-size:1.2rem;color:var(--text);margin-bottom:8px}
.empty code{font-size:0.85rem;background:var(--surface);padding:8px 16px;border-radius:8px;display:inline-block;margin-top:12px}

/* ── Footer ───────────────────────── */
.footer{text-align:center;padding:32px 24px;color:var(--text2);font-size:0.75rem;border-top:1px solid var(--border);margin-top:48px}

/* ── Loading ──────────────────────── */
.loading{text-align:center;padding:48px;color:var(--text2);font-size:0.9rem}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);
border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  .hero h1{font-size:1.8rem}
  .hero .tagline{font-size:0.85rem}
  .rc-stats{grid-template-columns:repeat(3,1fr)}
  .agg-stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hero">
  <h1>Sigma Stack Audit</h1>
  <div class="tagline">Full-spectrum security audits combining five analysis layers. CVE intelligence, exploit proof-of-concepts, ATT&CK kill chain mapping.</div>
  <div class="tools-bar">
    <span class="tool-pill" data-t="vajra">Vajra</span>
    <span class="tool-pill" data-t="semgrep">Semgrep</span>
    <span class="tool-pill" data-t="zentinel">Zentinel</span>
    <span class="tool-pill" data-t="vulngraph">VulnGraph MCP</span>
    <span class="tool-pill" data-t="github">GitHub</span>
  </div>
</div>

<div class="container">
  <div class="agg-stats" id="agg-stats"></div>

  <div class="reports-header">
    <h2>Audit Reports</h2>
    <span class="count" id="report-count"></span>
  </div>

  <div id="reports" class="report-grid">
    <div class="loading"><div class="spinner"></div>Loading reports...</div>
  </div>
</div>

<div class="footer">
  <a href="https://github.com/copyleftdev/sigma-audit">sigma-audit</a>
  &middot; Vajra + Semgrep + Zentinel + <a href="https://vulngraph.tools">VulnGraph</a> MCP
</div>

<script>
const ARROW='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

function animateNum(el,target,dur=1200){
  const start=performance.now();
  (function tick(now){
    const p=Math.min((now-start)/dur,1);
    const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(e*target).toLocaleString();
    if(p<1)requestAnimationFrame(tick);
  })(performance.now());
}

async function main(){
  // Stagger tool pills
  document.querySelectorAll('.tool-pill').forEach((el,i)=>
    setTimeout(()=>el.classList.add('show'),300+i*100));

  // Fetch manifest
  let manifest;
  try{
    const resp=await fetch('reports/manifest.json');
    manifest=await resp.json();
  }catch(e){
    document.getElementById('reports').innerHTML=
      '<div class="empty"><h3>No audits yet</h3><p>Run your first audit:</p><code>python3 sigma-audit.py owner/repo --publish</code></div>';
    return;
  }

  const reports=manifest.reports||[];
  if(!reports.length){
    document.getElementById('reports').innerHTML=
      '<div class="empty"><h3>No audits yet</h3><p>Run your first audit:</p><code>python3 sigma-audit.py owner/repo --publish</code></div>';
    return;
  }

  document.getElementById('report-count').textContent=`${reports.length} audit${reports.length>1?'s':''}`;

  // Aggregate stats across all audits
  let totalCves=0,totalCrit=0,totalExpl=0,totalChains=0,totalTechs=0,totalDeps=0;
  for(const r of reports){
    totalCves+=r.total_cves||0;
    totalCrit+=r.critical||0;
    totalExpl+=r.exploitable||0;
    totalChains+=r.attack_chains||0;
    totalTechs+=r.techniques||0;
    totalDeps+=r.dependencies||0;
  }

  const aggEl=document.getElementById('agg-stats');
  const aggCards=[
    {n:reports.length,l:'Repos Audited'},
    {n:totalDeps,l:'Dependencies'},
    {n:totalCves,l:'CVEs Found'},
    {n:totalCrit,l:'Critical',d:true},
    {n:totalExpl,l:'Exploitable',d:true},
    {n:totalChains,l:'Attack Chains'},
    {n:totalTechs,l:'ATT&CK Techniques'},
  ];
  aggEl.innerHTML=aggCards.map(c=>
    `<div class="agg-card ${c.d?'danger':''}"><div class="n" data-target="${c.n}">0</div><div class="l">${c.l}</div></div>`
  ).join('');

  // Animate agg cards
  document.querySelectorAll('.agg-card').forEach((el,i)=>{
    setTimeout(()=>{
      el.classList.add('show');
      const numEl=el.querySelector('.n');
      if(numEl.dataset.target)animateNum(numEl,parseInt(numEl.dataset.target));
    },100+i*80);
  });

  // Render report cards
  const container=document.getElementById('reports');
  container.innerHTML=reports.sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
    const topCveHtml=r.top_cve?`
      <div class="rc-top-cve">
        <span class="cve-id">${r.top_cve}</span>
        CVSS ${r.top_cve_cvss.toFixed(1)} &middot; EPSS ${(r.top_cve_epss*100).toFixed(0)}%
        <span class="cve-meta">Top finding</span>
      </div>`:'';

    return`<a class="report-card" href="reports/${r.slug}/">
      <div class="rc-top">
        <div>
          <div class="rc-repo">${r.repo}</div>
          <div class="rc-date">${r.date}</div>
        </div>
        <span class="rc-risk ${r.risk}">${r.risk}</span>
      </div>
      <div class="rc-stats">
        <div class="rc-stat"><div class="v">${r.total_cves}</div><div class="k">CVEs</div></div>
        <div class="rc-stat crit"><div class="v">${r.critical}</div><div class="k">Critical</div></div>
        <div class="rc-stat"><div class="v">${r.high}</div><div class="k">High</div></div>
        <div class="rc-stat expl"><div class="v">${r.exploitable}</div><div class="k">Exploitable</div></div>
        <div class="rc-stat"><div class="v">${r.attack_chains}</div><div class="k">Kill Chains</div></div>
        <div class="rc-stat"><div class="v">${r.techniques}</div><div class="k">Techniques</div></div>
        <div class="rc-stat"><div class="v">${r.dependencies}</div><div class="k">Deps</div></div>
        <div class="rc-stat"><div class="v">${(r.pattern_findings||0).toLocaleString()}</div><div class="k">Patterns</div></div>
      </div>
      ${topCveHtml}
      <div class="rc-footer">View full report ${ARROW}</div>
    </a>`;
  }).join('');

  // Stagger card reveal
  document.querySelectorAll('.report-card').forEach((el,i)=>
    setTimeout(()=>el.classList.add('show'),400+i*150));
}

main();
</script>
</body>
</html>
